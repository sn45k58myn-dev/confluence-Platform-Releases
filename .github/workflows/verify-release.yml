name: Verify release contract

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to verify
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify assets and checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: tools/verify-release.sh "${{ inputs.tag || github.event.release.tag_name }}" "${{ github.repository }}"
